name: build-ios-unsigned-ipa

on:
  # Keep manual dispatch enabled in addition to path-based push triggers.
  workflow_dispatch:
  push:
    paths:
      - "bridge/**"
      - "ios/**"
      - ".github/workflows/build-ios-unsigned-ipa.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish running status to build-status branch
        shell: bash
        run: |
          set -euo pipefail

          STATUS_DIR="$(mktemp -d)"
          printf 'running\n' > "${STATUS_DIR}/state.txt"
          printf '%s\n' "${GITHUB_SHA}" > "${STATUS_DIR}/source-commit.txt"
          printf '%s\n' "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" > "${STATUS_DIR}/updated-at-utc.txt"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin build-status; then
            git fetch origin build-status:build-status
            git checkout build-status
          else
            git checkout --orphan build-status
          fi

          find . -mindepth 1 -maxdepth 1 \
            ! -name .git \
            ! -name . \
            -exec rm -rf {} +

          mkdir -p status/latest
          cp "${STATUS_DIR}/state.txt" "status/latest/state.txt"
          cp "${STATUS_DIR}/source-commit.txt" "status/latest/source-commit.txt"
          cp "${STATUS_DIR}/updated-at-utc.txt" "status/latest/updated-at-utc.txt"

          git add status/latest
          git commit -m "Set build status to running for ${GITHUB_SHA}" || echo "No status changes to commit"
          git push --force origin HEAD:build-status
          git checkout "${GITHUB_SHA}"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: bridge/go.mod

      - name: Show Xcode version
        run: xcodebuild -version
        working-directory: ./ios

      - name: Prepare iOS project
        run: ./scripts/prepare-macos-build.sh
        working-directory: ./ios

      - name: Build unsigned IPA
        run: ./scripts/build-unsigned-ipa.sh
        working-directory: ./ios

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: VkTurnProxyIOS-unsigned-ipa
          path: ios/build/unsigned/VkTurnProxyIOS-unsigned.ipa
          if-no-files-found: error

      - name: Upload build logs and project outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: VkTurnProxyIOS-build-support
          path: |
            ios/VkTurnProxyIOS.xcodeproj
            ios/Frameworks
            ios/build/unsigned
          if-no-files-found: warn

      - name: Publish unsigned IPA to build-artifacts branch
        if: success()
        shell: bash
        run: |
          set -euo pipefail

          ARTIFACT_DIR="$(mktemp -d)"
          cp "ios/build/unsigned/VkTurnProxyIOS-unsigned.ipa" "${ARTIFACT_DIR}/VkTurnProxyIOS-unsigned.ipa"
          shasum -a 256 "${ARTIFACT_DIR}/VkTurnProxyIOS-unsigned.ipa" > "${ARTIFACT_DIR}/VkTurnProxyIOS-unsigned.ipa.sha256.txt"
          printf '%s\n' "${GITHUB_SHA}" > "${ARTIFACT_DIR}/source-commit.txt"
          printf '%s\n' "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" > "${ARTIFACT_DIR}/built-at-utc.txt"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin build-artifacts; then
            git fetch origin build-artifacts:build-artifacts
            git checkout build-artifacts
          else
            git checkout --orphan build-artifacts
          fi

          find . -mindepth 1 -maxdepth 1 \
            ! -name .git \
            ! -name . \
            -exec rm -rf {} +

          mkdir -p unsigned/latest
          cp "${ARTIFACT_DIR}/VkTurnProxyIOS-unsigned.ipa" "unsigned/latest/VkTurnProxyIOS-unsigned.ipa"
          cp "${ARTIFACT_DIR}/VkTurnProxyIOS-unsigned.ipa.sha256.txt" "unsigned/latest/VkTurnProxyIOS-unsigned.ipa.sha256.txt"
          cp "${ARTIFACT_DIR}/source-commit.txt" "unsigned/latest/source-commit.txt"
          cp "${ARTIFACT_DIR}/built-at-utc.txt" "unsigned/latest/built-at-utc.txt"

          git add unsigned/latest
          git commit -m "Publish unsigned IPA for ${GITHUB_SHA}" || echo "No artifact changes to commit"
          git push --force origin HEAD:build-artifacts

      - name: Publish success status to build-status branch
        if: success()
        shell: bash
        run: |
          set -euo pipefail

          STATUS_DIR="$(mktemp -d)"
          printf 'success\n' > "${STATUS_DIR}/state.txt"
          printf '%s\n' "${GITHUB_SHA}" > "${STATUS_DIR}/source-commit.txt"
          printf '%s\n' "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" > "${STATUS_DIR}/updated-at-utc.txt"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin build-status; then
            git fetch origin build-status:build-status
            git checkout build-status
          else
            git checkout --orphan build-status
          fi

          find . -mindepth 1 -maxdepth 1 \
            ! -name .git \
            ! -name . \
            -exec rm -rf {} +

          mkdir -p status/latest
          cp "${STATUS_DIR}/state.txt" "status/latest/state.txt"
          cp "${STATUS_DIR}/source-commit.txt" "status/latest/source-commit.txt"
          cp "${STATUS_DIR}/updated-at-utc.txt" "status/latest/updated-at-utc.txt"

          git add status/latest
          git commit -m "Set build status to success for ${GITHUB_SHA}" || echo "No status changes to commit"
          git push --force origin HEAD:build-status

      - name: Publish failure status to build-status branch
        if: failure()
        shell: bash
        run: |
          set -euo pipefail

          STATUS_DIR="$(mktemp -d)"
          printf 'failed\n' > "${STATUS_DIR}/state.txt"
          printf '%s\n' "${GITHUB_SHA}" > "${STATUS_DIR}/source-commit.txt"
          printf '%s\n' "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" > "${STATUS_DIR}/updated-at-utc.txt"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin build-status; then
            git fetch origin build-status:build-status
            git checkout build-status
          else
            git checkout --orphan build-status
          fi

          find . -mindepth 1 -maxdepth 1 \
            ! -name .git \
            ! -name . \
            -exec rm -rf {} +

          mkdir -p status/latest
          cp "${STATUS_DIR}/state.txt" "status/latest/state.txt"
          cp "${STATUS_DIR}/source-commit.txt" "status/latest/source-commit.txt"
          cp "${STATUS_DIR}/updated-at-utc.txt" "status/latest/updated-at-utc.txt"

          git add status/latest
          git commit -m "Set build status to failed for ${GITHUB_SHA}" || echo "No status changes to commit"
          git push --force origin HEAD:build-status
